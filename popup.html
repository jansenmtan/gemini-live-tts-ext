<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gemini TTS Controls</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: auto;
      padding: 10px;
    }
    .controls-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      width: 30px;
      margin: 0;
      cursor: pointer;
      border-radius: 50%;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .volume-container {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-grow: 1;
    }
    #volumeControl {
      flex-grow: 1;
    }
    #volumeValue {
      min-width: 45px;
      text-align: right;
    }
    #status {
      margin-top: 5px;
      font-style: italic;
      text-align: center;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="header-banner">
    <div class="header-left">
      <img src="icon-32.png" class="extension-icon" alt="Icon">
      <span class="extension-name">Gemini Live TTS</span>
    </div>
    <div class="header-right">
      <button class="header-btn donate-btn" title="Support the project">❤️</button>
      <button class="header-btn settings-btn" title="Settings">⚙️</button>
    </div>
  </div>
  <div class="controls-container">
    <button id="playPause" disabled>▶</button>
    <button id="stop">⏹</button>
    <div class="volume-container">
      <span class="volume-label">🔊</span>
      <input type="range" id="volumeControl" min="0" max="100" value="100">
      <span id="volumeValue">100%</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
