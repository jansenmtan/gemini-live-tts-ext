<!DOCTYPE html>
<html>
<head>
  <title>Gemini TTS Settings</title>
   <link rel="stylesheet" href="styles.css">
   <style>
    details {
      margin-top: 1rem;
    }

    summary {
      cursor: pointer;
      padding: 8px 0;
    }

    #status {
      margin-top: 1rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2><img src="icon-32.png" class="icon" /> Settings</h2>
    <div class="step">
      <h3>API Configuration</h3>
      <div class="field">
        <label for="apiKey">Gemini API Key:</label>
        <input type="text" id="apiKey">
      </div>
      <div class="field">
        <label for="voiceSelect">Voice:</label>
        <select id="voiceSelect">
          <option value="puck">Puck</option>
          <option value="charon">Charon</option>
          <option value="kore">Kore</option>
          <option value="fenrir">Fenrir</option>
          <option value="aoede">Aoede</option>
        </select>
      </div>
    </div>

    <div class="field">
      <details>
        <summary>Advanced settings</summary>
        <div class="field">
          <label for="systemPrompt" title="Instructions Gemini will follow for text and image inputs.&#013Leave blank to use the default system prompt.">System Prompt:</label>
          <textarea id="systemPrompt" rows="4" placeholder="You generate speech from given text." style="width: 100%;"></textarea>
        </div>
      </details>
    </div>

    <button id="save">Save</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
